services:
  tor_server:
    image: ghcr.io/getumbrel/tor:0.4.9.11@sha256:e382b8629c0dfef6ceb396b062622d4e4e955b19d6f16b883fd2c0723ad5671a
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${TOR_ENTRYPOINT_SCRIPT}:/umbrel/entrypoint.sh
      - ${TOR_DATA_DIR}:/data
    environment:
      HOME: '/tmp'
      HS_DIR: '${TOR_HS_APP_DIR}'
      HS_PORTS: '${TOR_HS_PORTS}'
    entrypoint: '/umbrel/entrypoint.sh'
