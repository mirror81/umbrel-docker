services:
  tor_proxy:
    container_name: tor_proxy
    image: ghcr.io/getumbrel/tor:0.4.9.11@sha256:e382b8629c0dfef6ceb396b062622d4e4e955b19d6f16b883fd2c0723ad5671a
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${UMBREL_TORRC}:/etc/tor/torrc:ro
      - ${UMBREL_DATA_DIR}/tor/data:/data
    environment:
      HOME: '/tmp'
    networks:
      umbrel_main_network:
        ipv4_address: $TOR_PROXY_IP
  auth:
    container_name: auth
    image: getumbrel/auth-server:1.7.0@sha256:7fc9d52d4176639e84044b63aa07efcac78a508a05bb4480436be9db977a7191
    user: '1000:1000'
    # build:
    #   dockerfile: containers/app-auth/Dockerfile
    #   context: ../../../../../../
    restart: on-failure
    environment:
      PORT: $AUTH_PORT
      UMBREL_AUTH_SECRET: $UMBREL_AUTH_SECRET
      MANAGER_IP: $MANAGER_IP
      MANAGER_PORT: 3006
      DASHBOARD_IP: $DASHBOARD_IP
      DASHBOARD_PORT: 3004
      JWT_SECRET: $JWT_SECRET
      UMBRELD_RPC_HOST: $UMBRELD_RPC_HOST
    volumes:
      - ${UMBREL_DATA_DIR}/tor/data:/var/lib/tor:ro
      - ${UMBREL_DATA_DIR}/app-data:/app-data:ro
      - ${UMBREL_DATA_DIR}:/data:ro
    ports:
      - '${AUTH_PORT}:${AUTH_PORT}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      umbrel_main_network:
        ipv4_address: $AUTH_IP

networks:
  umbrel_main_network:
    external: true
